<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0077b6, #00b4d8);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD UTAMA */
.box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 0.8s ease;
}

h2 {
  margin-bottom: 5px;
}

p {
  color: #666;
  font-size: 14px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #0077b6;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #005f8a;
}

/* HASIL */
.result {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  color: white;
  animation: fadeIn 0.5s ease;
}

.lulus {
  background: linear-gradient(135deg, #1d3557, #457b9d);
}

.tidak {
  background: linear-gradient(135deg, #d62828, #f77f00);
}

/* ANIMASI */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #999;
}
</style>
</head>

<body>

<div class="box">
  <h2>PENGUMUMAN KELULUSAN</h2>
  <p>SMA Negeri 2 Sendawar<br>Tahun Ajaran 2025/2026</p>

  <input type="text" id="nisn" placeholder="Masukkan NISN">
  <input type="date" id="tanggalLahir">

  <button onclick="cekData()">Cek Hasil</button>

  <div id="hasil"></div>

  <div class="footer">© SMAN 2 Sendawar</div>
</div>

<!-- CONFETTI WAJIB DI ATAS -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- SCRIPT UTAMA -->
<script src="script.js"></script>

</body>
</html>
